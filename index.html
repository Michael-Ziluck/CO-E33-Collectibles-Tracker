<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const themes = ['light', 'dark', 'red', 'orange', 'yellow', 'green', 'blue', 'purple', 'pink'];
        const backgrounds = {
          light: '#fff',
          dark: '#18191d',
          red: '#231719',
          orange: '#231b14',
          yellow: '#211e13',
          green: '#142016',
          blue: '#152031',
          purple: '#1d1828',
          pink: '#231720',
        };
        const storedTheme = window.localStorage.getItem('e33-theme');
        const theme = themes.includes(storedTheme)
          ? storedTheme
          : window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'blue'
            : 'light';

        document.documentElement.dataset.theme = theme;
        document.documentElement.style.backgroundColor = backgrounds[theme];
      })();
    </script>
    <title>e33-collectibles-tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
